name: Copilot Internal Fast-Path

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fast-gate:
    name: Agent Fast Gate
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'copilot/') || startsWith(github.head_ref, 'grok/') || startsWith(github.head_ref, 'agent/')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run fast-path validation
        run: yarn typecheck && yarn lint && yarn format:check && yarn test && yarn ship-gate
