# Ship-Gate Verifier — Canonical Corpus L0 invariants
#
# Runs PROGRAM_CONTROL/ship-gate-verifier.ts on every push to main, every PR
# targeting main, and on a 20-minute cron. The verifier walks every L0
# invariant against the live tree and exits non-zero on any failure, so this
# job acts as the gate that keeps the Alpha-readiness counter ticking.
#
# Cadence math (per CEO target 2,000 green runs by 2026-06-01):
#   - 2,000 runs / ~30 days = ~67 runs/day required
#   - 20-min cron alone:    72 runs/day  ← already covers the floor
#   - PR + push runs:       additional buffer (no cancel-in-progress)
#
# The verifier is filesystem-only (no network, no DB, no secrets), so this
# workflow runs without any auth context and without the deploy-side
# secret env. Target runtime is under 60 seconds.

name: Ship-Gate Verifier

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every 20 minutes. Scheduled runs always check main's state.
    - cron: '*/20 * * * *'
  # Manual trigger for ad-hoc invariant audits.
  workflow_dispatch:

# Read-only — the verifier never mutates the repo or any external system.
permissions:
  contents: read

# Each PR / branch gets its own concurrency group. We deliberately do NOT
# cancel-in-progress: every successful run counts toward the 2,000-run
# Alpha-readiness target.
concurrency:
  group: ship-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ship-gate:
    name: Canonical Corpus L0 Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'yarn'

      # Plain `yarn install --frozen-lockfile` to align with every other
      # workflow in this repo (ci.yml, deploy.yml, copilot-setup-steps.yml).
      # The previous `--ignore-scripts` flag was wrong: even though the
      # verifier itself is filesystem-only and never imports @prisma/client,
      # skipping the postinstall left the Prisma client unpopulated and
      # ts-node would choke on type resolution in the project's dep graph
      # the moment it touched the project tsconfig (which it still tries
      # to read for its own discovery, even with --project pointing
      # elsewhere). Letting `prisma generate` run is the cheap and right
      # answer.
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Diagnostic: capture environment + version info before the verifier runs.
      # The first three CI runs of this workflow failed with no obvious cause
      # in the verifier itself (verifier exits 0 GREEN locally). Print enough
      # context here so the next failure has something to diff against.
      - name: Diagnostics
        run: |
          echo "=== Environment ==="
          node --version
          yarn --version
          ls -la node_modules/.bin/ts-node || echo "ts-node binary missing"
          ./node_modules/.bin/ts-node --version || echo "ts-node --version failed"
          echo
          echo "=== Workflow context ==="
          echo "PWD: $(pwd)"
          echo "Files: $(ls)"
          echo
          echo "=== Ship-gate config ==="
          cat package.json | grep -A1 ship-gate || true
          echo
          echo "=== PROGRAM_CONTROL/tsconfig.json ==="
          cat PROGRAM_CONTROL/tsconfig.json || echo "tsconfig missing"

      - name: Run ship-gate verifier (human-readable output to log)
        id: verify
        run: |
          set +e
          yarn ship-gate 2>&1 | tee ship-gate-output.txt
          EXIT=${PIPESTATUS[0]}
          echo
          echo "=== ship-gate exit code: $EXIT ==="
          exit $EXIT

      # Always run, even if the previous step failed, so the JSON report is
      # available as an artifact for failure investigation.
      - name: Generate JSON report
        if: always()
        run: yarn ship-gate --json > ship-gate-report.json || true

      - name: Append summary to Actions UI
        if: always()
        run: |
          if [ ! -s ship-gate-report.json ]; then
            echo "# Ship-Gate report unavailable" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          SUMMARY=$(jq -r '.summary // "UNKNOWN"' ship-gate-report.json)
          PASS=$(jq -r '.passed // 0' ship-gate-report.json)
          FAIL=$(jq -r '.failed // 0' ship-gate-report.json)
          SKIP=$(jq -r '.skipped // 0' ship-gate-report.json)
          TOTAL=$(jq -r '.total // 0' ship-gate-report.json)
          TS=$(jq -r '.generated_at_utc // "?"' ship-gate-report.json)
          {
            echo "# Ship-Gate: $SUMMARY"
            echo
            echo "- Generated: \`$TS\`"
            echo "- Pass: **$PASS**"
            echo "- Fail: **$FAIL**"
            echo "- Skip: **$SKIP**"
            echo "- Total: **$TOTAL**"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$FAIL" -gt 0 ]; then
            {
              echo
              echo "## Failures"
              jq -r '.results[] | select(.status == "FAIL") | "### " + .id + " — " + .description + "\n" + ((.evidence // []) | map("- " + .) | join("\n")) + (if .remediation then "\n- Remediation: " + .remediation else "" end)' ship-gate-report.json
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports + raw output artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ship-gate-report-${{ github.run_id }}
          # Include both the JSON report (when present) and the captured
          # run output, so failures that crash before producing the JSON
          # still leave evidence behind.
          path: |
            ship-gate-report.json
            ship-gate-output.txt
          retention-days: 30
          if-no-files-found: warn
